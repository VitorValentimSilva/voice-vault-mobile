<?xml version="1.0" encoding="UTF-8"?>
<!--
  Voice Vault — Logo in-app LIGHT theme
  Uso: telas de login, splash, not found, onboarding no tema claro
  Tamanho recomendado de uso: 80×80 dp a 120×120 dp
  Fundo: backgroundDeep (#EDE9FF) → surfaceElevated light (#D4CAFF)
  Escudo: rgba(107,63,224,0.10) com borda #6B3FE0
  Onda: gradient #6B3FE0 → #00897A
-->
<svg
  width="120"
  height="120"
  viewBox="0 0 120 120"
  xmlns="http://www.w3.org/2000/svg"
  role="img"
  aria-label="Voice Vault logo"
>
  <defs>
    <!-- Fundo: backgroundDeep → surfaceElevated tinted (light) -->
    <linearGradient id="lightBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#EDE9FF"/>
      <stop offset="100%" stop-color="#D4CAFF"/>
    </linearGradient>

    <!-- Onda: primary → accentDark (light) -->
    <linearGradient id="lightWave" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#6B3FE0"/>
      <stop offset="100%" stop-color="#00897A"/>
    </linearGradient>

    <!-- Corner radius 28px (in-app) -->
    <clipPath id="lightClip">
      <rect width="120" height="120" rx="28" ry="28"/>
    </clipPath>
  </defs>

  <!-- Fundo -->
  <rect
    width="120" height="120"
    fill="url(#lightBg)"
    clip-path="url(#lightClip)"
  />

  <!-- Brilho sutil no canto superior esquerdo -->
  <ellipse
    cx="28" cy="18" rx="44" ry="34"
    fill="rgba(107,63,224,0.06)"
    clip-path="url(#lightClip)"
  />

  <!-- Escudo: glass fill + borda primary light -->
  <path
    d="M60 20 C60 20 86 28 86 47 C86 68 73 81 60 89 C47 81 34 68 34 47 C34 28 60 20 60 20Z"
    fill="rgba(107,63,224,0.10)"
    stroke="#6B3FE0"
    stroke-width="1.5"
    clip-path="url(#lightClip)"
  />

  <!-- Onda de voz (waveform) -->
  <polyline
    points="40,60 44,60 47,51 50,69 53,46 56,72 59,56 62,64 65,48 68,70 71,53 74,60 76,60 80,60"
    fill="none"
    stroke="url(#lightWave)"
    stroke-width="2.8"
    stroke-linecap="round"
    stroke-linejoin="round"
    clip-path="url(#lightClip)"
  />
</svg>
