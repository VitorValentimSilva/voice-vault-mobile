<?xml version="1.0" encoding="UTF-8"?>
<!--
  Voice Vault — Logo in-app DARK theme
  Uso: telas de login, splash, not found, onboarding no tema escuro
  Tamanho recomendado de uso: 80×80 dp a 120×120 dp
  Fundo: surfaceElevated (#1C1638) → border (#2E2560)
  Escudo: rgba(124,90,246,0.18) com borda #7C5AF6
  Onda: gradient #7C5AF6 → #00B2A0
-->
<svg
  width="120"
  height="120"
  viewBox="0 0 120 120"
  xmlns="http://www.w3.org/2000/svg"
  role="img"
  aria-label="Voice Vault logo"
>
  <defs>
    <!-- Fundo: surfaceElevated → border (dark) -->
    <linearGradient id="darkBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#1C1638"/>
      <stop offset="100%" stop-color="#2E2560"/>
    </linearGradient>

    <!-- Onda: primary → accent (dark) -->
    <linearGradient id="darkWave" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#7C5AF6"/>
      <stop offset="100%" stop-color="#00B2A0"/>
    </linearGradient>

    <!-- Corner radius 28px (in-app, mais suave que o ícone de loja) -->
    <clipPath id="darkClip">
      <rect width="120" height="120" rx="28" ry="28"/>
    </clipPath>
  </defs>

  <!-- Fundo -->
  <rect
    width="120" height="120"
    fill="url(#darkBg)"
    clip-path="url(#darkClip)"
  />

  <!-- Brilho sutil no canto superior esquerdo -->
  <ellipse
    cx="28" cy="18" rx="44" ry="34"
    fill="rgba(155,126,255,0.07)"
    clip-path="url(#darkClip)"
  />

  <!-- Escudo: glass fill + borda primary -->
  <path
    d="M60 20 C60 20 86 28 86 47 C86 68 73 81 60 89 C47 81 34 68 34 47 C34 28 60 20 60 20Z"
    fill="rgba(124,90,246,0.18)"
    stroke="#7C5AF6"
    stroke-width="1.5"
    clip-path="url(#darkClip)"
  />

  <!-- Onda de voz (waveform) -->
  <polyline
    points="40,60 44,60 47,51 50,69 53,46 56,72 59,56 62,64 65,48 68,70 71,53 74,60 76,60 80,60"
    fill="none"
    stroke="url(#darkWave)"
    stroke-width="2.8"
    stroke-linecap="round"
    stroke-linejoin="round"
    clip-path="url(#darkClip)"
  />
</svg>
